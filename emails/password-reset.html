<!-- Subject: Reset your password -->
<!-- Preheader: Click the link to reset your password -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background-color: #f9fafb;">
  <div style="max-width: 600px; margin: 0 auto; padding: 40px 20px;">
    <div style="background: white; border-radius: 8px; padding: 32px; border: 1px solid #e5e7eb;">
      <h1 style="margin: 0 0 16px; font-size: 24px; color: #111827;">Reset Your Password</h1>
      <p style="margin: 0 0 16px; color: #4b5563; line-height: 1.6;">
        We received a request to reset your password. Click the button below to set a new password.
      </p>
      <a href="{{resetUrl}}" style="display: inline-block; background: #2563eb; color: white; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 500;">
        Reset Password
      </a>
      <p style="margin: 24px 0 0; color: #9ca3af; font-size: 14px;">
        If you didn't request this, you can safely ignore this email.
      </p>
    </div>
    <p style="margin: 24px 0 0; text-align: center; color: #9ca3af; font-size: 12px;">
      Powered by SweetCMS
    </p>
  </div>
</body>
</html>
